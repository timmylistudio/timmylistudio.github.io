<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Homepage Admin Login</title>
    <link rel="stylesheet" href="admin.css?v=20260529-analytics-archive">
  </head>
  <body>
    <main class="admin-shell login-shell">
      <header>
        <p class="kicker">timmylistudio.github.io</p>
        <h1>Admin Login</h1>
        <p>Sign in with GitHub to open the homepage editor.</p>
      </header>

      <section class="panel login-panel">
        <h2>GitHub OAuth</h2>
        <div class="actions">
          <button id="github-login" type="button">Sign in with GitHub</button>
        </div>
        <p id="session-status" class="session-status">Checking login...</p>
      </section>

      <pre id="status" aria-live="polite"></pre>
    </main>

    <script src="config.js?v=20260517-oauth"></script>
    <script src="login.js?v=20260517-loginpage"></script>
  </body>
</html>
